en the atmosphere, land surfaces, and oceans.","cat":"nature","x":-0.017677,"y":-0.259254,"z":-0.264650,"r":0.3709,"sd":-0.264628,"su":-0.017649,"sv":-0.259279,"n":["tech-10","biz-10","nat-06","nat-20","nat-16"]},{"id":"nat-08","text":"Bees pollinate roughly one-third of the food crops that humans depend on for survival.","cat":"nature","x":-0.042651,"y":-0.239648,"z":0.075497,"r":0.2549,"sd":0.075517,"su":-0.042625,"sv":-0.239646,"n":["nat-11","cook-12","cook-14","cook-15","cook-11"]},{"id":"nat-09","text":"Glaciers store about seventy percent of all the fresh water on the planet's surface.","cat":"nature","x":-0.014984,"y":-0.293309,"z":-0.073476,"r":0.3027,"sd":-0.073451,"su":-0.014952,"sv":-0.293317,"n":["health-10","sci-16","nat-17","nat-15","nat-14"]},{"id":"nat-10","text":"Mangrove forests protect coastlines from erosion and serve as nurseries for juvenile fish.","cat":"nature","x":0.077623,"y":-0.365010,"z":-0.062090,"r":0.3783,"sd":-0.062059,"su":0.077662,"sv":-0.365007,"n":["nat-14","nat-01","nat-19","nat-15","nat-05"]},{"id":"nat-11","text":"Soil contains billions of microorganisms per gram that decompose organic matter and recycle nutrients.","cat":"nature","x":-0.063482,"y":-0.307431,"z":0.082107,"r":0.3245,"sd":0.082133,"su":-0.063449,"sv":-0.307431,"n":["nat-08","cook-11","cook-08","cook-12","cook-14"]},{"id":"nat-12","text":"The Great Barrier Reef stretches over 2,300 kilometers along the northeastern coast of Australia.","cat":"nature","x":0.098824,"y":-0.167820,"z":-0.147425,"r":0.2443,"sd":-0.147411,"su":0.098841,"sv":-0.167822,"n":["nat-13","biz-15","biz-05","nat-20","nat-05"]},{"id":"nat-13","text":"Wolves reintroduced to Yellowstone reshaped the entire ecosystem by altering elk grazing patterns.","cat":"nature","x":0.085009,"y":-0.139391,"z":-0.195841,"r":0.2550,"sd":-0.195830,"su":0.085024,"sv":-0.139399,"n":["biz-05","nat-12","nat-20","biz-15","nat-03"]},{"id":"nat-14","text":"Tidal pools form miniature ecosystems where sea stars, anemones, and crabs coexist in shallow rock basins.","cat":"nature","x":0.062665,"y":-0.351864,"z":-0.080983,"r":0.3665,"sd":-0.080953,"su":0.062703,"sv":-0.351864,"n":["nat-10","nat-01","nat-15","nat-19","nat-05"]},{"id":"nat-15","text":"How do mycorrhizal fungi form symbiotic networks with tree roots to exchange nutrients underground?","cat":"nature","x":0.034749,"y":-0.360231,"z":-0.028356,"r":0.3630,"sd":-0.028326,"su":0.034788,"sv":-0.360230,"n":["nat-10","nat-14","nat-09","nat-19","cook-19"]},{"id":"nat-16","text":"What causes the rapid decline of insect populations in agricultural regions around the world?","cat":"nature","x":-0.114222,"y":-0.312193,"z":-0.274461,"r":0.4311,"sd":-0.274434,"su":-0.114188,"sv":-0.312228,"n":["tech-10","sci-11","nat-07","hist-18","nat-06"]},{"id":"nat-17","text":"Why are wetlands considered among the most productive ecosystems on the planet?","cat":"nature","x":0.002553,"y":-0.318493,"z":-0.156097,"r":0.3547,"sd":-0.156070,"su":0.002587,"sv":-0.318506,"n":["nat-04","hist-18","nat-09","health-10","nat-14"]},{"id":"nat-18","text":"How do deep-ocean hydrothermal vents support life without any energy from sunlight?","cat":"nature","x":0.171165,"y":-0.399214,"z":0.047567,"r":0.4370,"sd":0.047601,"su":0.171208,"sv":-0.399192,"n":["nat-02","nat-19","sci-06","nat-01","cook-19"]},{"id":"nat-19","text":"What mechanisms allow certain species to thrive in the extreme cold of the Antarctic?","cat":"nature","x":0.133171,"y":-0.395574,"z":-0.035029,"r":0.4189,"sd":-0.034995,"su":0.133213,"sv":-0.395563,"n":["nat-01","nat-10","nat-02","nat-14","nat-18"]},{"id":"nat-20","text":"Can reforestation projects fully restore the biodiversity of a previously cleared habitat?","cat":"nature","x":0.016411,"y":-0.102749,"z":-0.105877,"r":0.1484,"sd":-0.105868,"su":0.016422,"sv":-0.102756,"n":["nat-07","biz-10","nat-06","tech-10","nat-13"]},{"id":"hist-01","text":"The Renaissance saw a dramatic revival of art, science, and classical learning across Europe.","cat":"history","x":-0.216872,"y":0.271201,"z":-0.277129,"r":0.4443,"sd":-0.277152,"su":-0.216901,"sv":0.271154,"n":["hist-10","art-14","hist-03","hist-04","hist-06"]},{"id":"hist-02","text":"The Industrial Revolution transformed manufacturing through steam power and mechanization.","cat":"history","x":-0.338250,"y":0.133225,"z":-0.258038,"r":0.4458,"sd":-0.258049,"su":-0.338264,"sv":0.133167,"n":["art-10","hist-15","hist-14","hist-06","art-02"]},{"id":"hist-03","text":"Ancient Rome built an extensive network of roads and aqueducts across its vast empire.","cat":"history","x":-0.169762,"y":0.112433,"z":-0.224092,"r":0.3028,"sd":-0.224101,"su":-0.169774,"sv":0.112396,"n":["hist-06","hist-14","hist-10","art-10","hist-09"]},{"id":"hist-04","text":"The invention of the printing press revolutionized the spread of knowledge and literacy.","cat":"history","x":-0.358439,"y":0.272812,"z":-0.236109,"r":0.5086,"sd":-0.236132,"su":-0.358468,"sv":0.272754,"n":["biz-06","biz-07","hist-15","art-18","art-10"]},{"id":"hist-05","text":"European exploration in the fifteenth century established new trade routes across the globe.","cat":"history","x":-0.177577,"y":0.028920,"z":-0.332311,"r":0.3779,"sd":-0.332314,"su":-0.177580,"sv":0.028873,"n":["biz-17","hist-12","biz-01","hist-17","hist-13"]},{"id":"hist-06","text":"The French Revolution fundamentally transformed the political structure of France and Europe.","cat":"history","x":-0.229549,"y":0.131937,"z":-0.282777,"r":0.3874,"sd":-0.282788,"su":-0.229563,"sv":0.131889,"n":["hist-03","hist-14","art-10","hist-10","hist-02"]},{"id":"hist-07","text":"The Silk Road facilitated the exchange of goods, ideas, and culture between East Asia and the Mediterranean.","cat":"history","x":-0.274214,"y":0.018907,"z":-0.205562,"r":0.3432,"sd":-0.205563,"su":-0.274216,"sv":0.018860,"n":["tech-02","art-02","biz-18","tech-08","hist-02"]},{"id":"hist-08","text":"The abolition of slavery in the nineteenth century marked a turning point in the fight for human rights.","cat":"history","x":-0.241027,"y":0.144978,"z":-0.025269,"r":0.2824,"sd":-0.025282,"su":-0.241042,"sv":0.144950,"n":["tech-11","art-15","art-08","art-18","art-07"]},{"id":"hist-09","text":"The construction of the Great Wall of China spanned multiple dynasties and over two thousand years.","cat":"history","x":-0.094403,"y":0.118617,"z":-0.243620,"r":0.2869,"sd":-0.243630,"su":-0.094416,"sv":0.118586,"n":["hist-10","hist-03","biz-16","hist-06","art-05"]},{"id":"hist-10","text":"The Space Race between the United States and the Soviet Union accelerated advances in rocket technology.","cat":"history","x":-0.112494,"y":0.127172,"z":-0.172620,"r":0.2421,"sd":-0.172631,"su":-0.112507,"sv":0.127146,"n":["hist-01","hist-03","hist-09","hist-06","hist-14"]},{"id":"hist-11","text":"The signing of the Magna Carta in 1215 established the principle that even monarchs are subject to law.","cat":"history","x":-0.159965,"y":0.042741,"z":0.017895,"r":0.1665,"sd":0.017891,"su":-0.159970,"sv":0.042725,"n":["sci-13","hist-08","phil-09","tech-12","art-15"]},{"id":"hist-12","text":"Ancient Egyptian civilization thrived along the Nile for over three thousand years before Roman conquest.","cat":"history","x":-0.103513,"y":-0.003516,"z":-0.257067,"r":0.2771,"sd":-0.257067,"su":-0.103513,"sv":-0.003549,"n":["biz-17","biz-01","hist-05","hist-17","biz-02"]},{"id":"hist-13","text":"The fall of Constantinople in 1453 ended the Byzantine Empire and shifted power in southeastern Europe.","cat":"history","x":-0.176129,"y":-0.056565,"z":-0.273648,"r":0.3303,"sd":-0.273643,"su":-0.176123,"sv":-0.056607,"n":["biz-02","hist-17","hist-16","biz-11","biz-18"]},{"id":"hist-14","text":"The Marshall Plan helped rebuild Western European economies devastated by the Second World War.","cat":"history","x":-0.150033,"y":0.061712,"z":-0.166274,"r":0.2323,"sd":-0.166279,"su":-0.150039,"sv":0.061682,"n":["hist-06","hist-03","art-10","art-02","hist-02"]},{"id":"hist-15","text":"How did the invention of writing transform governance and record-keeping in ancient Mesopotamia?","cat":"history","x":-0.313739,"y":0.150242,"z":-0.180445,"r":0.3919,"sd":-0.180458,"su":-0.313756,"sv":0.150193,"n":["hist-02","hist-20","art-10","hist-04","art-15"]},{"id":"hist-16","text":"What social and economic conditions led to the outbreak of the French Revolution?","cat":"history","x":-0.291600,"y":-0.048453,"z":-0.348955,"r":0.4573,"sd":-0.348951,"su":-0.291595,"sv":-0.048514,"n":["biz-18","hist-13","art-02","biz-02","hist-17"]},{"id":"hist-17","text":"Why did the Roman Empire eventually split into eastern and western halves?","cat":"history","x":-0.132495,"y":-0.045706,"z":-0.273845,"r":0.3076,"sd":-0.273841,"su":-0.132490,"sv":-0.045743,"n":["biz-02","hist-13","hist-12","biz-11","biz-01"]},{"id":"hist-18","text":"How did the Columbian Exchange alter ecosystems and diets on both sides of the Atlantic?","cat":"history","x":-0.059588,"y":-0.361998,"z":-0.186464,"r":0.4115,"sd":-0.186433,"su":-0.059550,"sv":-0.362021,"n":["nat-17","nat-04","health-10","sci-11","nat-09"]},{"id":"hist-19","text":"What lessons can modern democracies draw from the political experiments of ancient Athens?","cat":"history","x":-0.172790,"y":0.207261,"z":-0.022650,"r":0.2708,"sd":-0.022668,"su":-0.172812,"sv":0.207241,"n":["art-07","art-08","art-03","tech-11","art-18"]},{"id":"hist-20","text":"How did the codification of laws in ancient Babylon influence later legal traditions?","cat":"history","x":-0.230918,"y":0.080325,"z":-0.091786,"r":0.2612,"sd":-0.091793,"su":-0.230927,"sv":0.080293,"n":["hist-15","art-15","tech-16","hist-02","art-10"]},{"id":"health-01","text":"Regular aerobic exercise strengthens the heart and reduces the risk of cardiovascular disease.","cat":"health","x":0.565721,"y":0.108308,"z":-0.073890,"r":0.5807,"sd":-0.073900,"su":0.565710,"sv":0.108363,"n":["sport-15","health-11","sport-16","sport-17","health-08"]},{"id":"health-02","text":"A balanced diet rich in fruits, vegetables, and whole grains provides essential vitamins and minerals.","cat":"health","x":0.232320,"y":-0.260336,"z":0.154078,"r":0.3814,"sd":0.154100,"su":0.232348,"sv":-0.260298,"n":["health-19","cook-09","cook-04","sci-09","health-05"]},{"id":"health-03","text":"Chronic sleep deprivation impairs cognitive function and weakens the immune system over time.","cat":"health","x":0.248562,"y":0.041229,"z":0.237415,"r":0.3462,"sd":0.237412,"su":0.248558,"sv":0.041276,"n":["health-18","health-16","health-12","health-04","health-09"]},{"id":"health-04","text":"Meditation and deep breathing exercises can measurably reduce stress hormones in the bloodstream.","cat":"health","x":0.405173,"y":0.153370,"z":0.201809,"r":0.4779,"sd":0.201796,"su":0.405156,"sv":0.153430,"n":["health-16","health-18","health-12","sci-20","health-03"]},{"id":"health-05","text":"Antibiotics treat bacterial infections but are completely ineffective against viral illnesses.","cat":"health","x":0.158446,"y":-0.091945,"z":0.034265,"r":0.1864,"sd":0.034272,"su":0.158456,"sv":-0.091925,"n":["health-13","health-07","sci-09","health-06","health-19"]},{"id":"health-06","text":"Exposure to natural sunlight helps the body produce vitamin D, which is critical for bone health.","cat":"health","x":0.291141,"y":-0.112412,"z":0.126007,"r":0.3366,"sd":0.126017,"su":0.291153,"sv":-0.112370,"n":["health-07","health-13","health-05","health-15","sci-09"]},{"id":"health-07","text":"Excess sugar consumption contributes to obesity, type 2 diabetes, and chronic inflammation.","cat":"health","x":0.309320,"y":-0.110762,"z":0.080922,"r":0.3384,"sd":0.080931,"su":0.309332,"sv":-0.110722,"n":["health-13","health-06","health-05","health-15","sci-09"]},{"id":"health-08","text":"Resistance training preserves bone density and reduces the risk of osteoporosis in older adults.","cat":"health","x":0.538273,"y":0.124210,"z":-0.005814,"r":0.5524,"sd":-0.005824,"su":0.538260,"sv":0.124267,"n":["health-14","health-01","health-11","sport-15","sport-16"]},{"id":"health-09","text":"Gut microbiome diversity is strongly correlated with overall immune function and mental well-being.","cat":"health","x":0.209617,"y":-0.115819,"z":0.296395,"r":0.3811,"sd":0.296405,"su":0.209629,"sv":-0.115772,"n":["sci-18","art-04","cook-09","health-03","health-06"]},{"id":"health-10","text":"Handwashing with soap remains the single most effective measure for preventing the spread of infectious diseases.","cat":"health","x":-0.020496,"y":-0.109201,"z":-0.028857,"r":0.1148,"sd":-0.028848,"su":-0.020484,"sv":-0.109205,"n":["sci-16","nat-09","hist-18","nat-17","sci-12"]},{"id":"health-11","text":"Adequate hydration supports kidney function, joint lubrication, and thermoregulation during exercise.","cat":"health","x":0.502969,"y":0.070395,"z":-0.069834,"r":0.5126,"sd":-0.069840,"su":0.502961,"sv":0.070443,"n":["sport-15","health-01","sport-16","sport-17","health-08"]},{"id":"health-12","text":"Cognitive behavioral therapy is one of the most evidence-based treatments for depression and anxiety.","cat":"health","x":0.231284,"y":0.141436,"z":0.231341,"r":0.3564,"sd":0.231329,"su":0.231269,"sv":0.141480,"n":["health-18","health-16","health-03","health-04","sci-20"]},{"id":"health-13","text":"Omega-3 fatty acids found in fish and flaxseed help reduce systemic inflammation throughout the body.","cat":"health","x":0.338587,"y":-0.173929,"z":0.077209,"r":0.3884,"sd":0.077224,"su":0.338605,"sv":-0.173886,"n":["health-05","health-07","health-06","sci-09","health-19"]},{"id":"health-14","text":"Prolonged sitting increases the risk of metabolic syndrome regardless of how much exercise a person does.","cat":"health","x":0.477885,"y":0.158439,"z":0.012072,"r":0.5036,"sd":0.012059,"su":0.477869,"sv":0.158491,"n":["health-08","health-20","sport-08","health-01","sport-16"]},{"id":"health-15","text":"How does the body regulate its core temperature during strenuous physical activity?","cat":"health","x":0.385209,"y":-0.031958,"z":0.079140,"r":0.3946,"sd":0.079143,"su":0.385212,"sv": 6859,"sv":0.171725,"n":["phil-18","art-01","phil-07","phil-16","sci-05"]},{"id":"phil-03","text":"Existentialist thinkers argue that individuals must create their own meaning in an indifferent universe.","cat":"philosophy","x":-0.119427,"y":0.170027,"z":0.464068,"r":0.5085,"sd":0.464054,"su":-0.119445,"sv":0.170053,"n":["sci-05","sci-17","art-01","phil-15","phil-16"]},{"id":"phil-04","text":"Socrates believed that the unexamined life is not worth living and practiced relentless self-inquiry.","cat":"philosophy","x":-0.024389,"y":0.168981,"z":0.313758,"r":0.3572,"sd":0.313743,"su":-0.024407,"sv":0.169005,"n":["phil-15","phil-16","sci-17","phil-11","phil-06"]},{"id":"phil-05","text":"Determinism holds that every event is the inevitable result of preceding causes and natural laws.","cat":"philosophy","x":-0.121348,"y":0.052072,"z":0.134520,"r":0.1885,"sd":0.134515,"su":-0.121353,"sv":0.052071,"n":["tech-15","phil-19","biz-19","art-17","sci-04"]},{"id":"phil-06","text":"The mind-body problem asks how subjective conscious experience arises from physical brain processes.","cat":"philosophy","x":-0.023072,"y":0.322504,"z":0.382869,"r":0.5011,"sd":0.382841,"su":-0.023106,"sv":0.322534,"n":["phil-04","phil-01","tech-05","phil-10","phil-15"]},{"id":"phil-07","text":"Utilitarianism judges the morality of an action by the amount of happiness it produces for the greatest number.","cat":"philosophy","x":-0.113509,"y":0.113178,"z":0.249134,"r":0.2962,"sd":0.249124,"su":-0.113521,"sv":0.113187,"n":["biz-14","art-01","sci-05","phil-02","phil-03"]},{"id":"phil-08","text":"Immanuel Kant proposed that moral duties are grounded in reason and apply universally to all rational beings.","cat":"philosophy","x":-0.135840,"y":0.073892,"z":0.312953,"r":0.3491,"sd":0.312946,"su":-0.135848,"sv":0.073904,"n":["phil-20","biz-14","sci-04","phil-07","phil-03"]},{"id":"phil-09","text":"The concept of social contract theory influenced the design of modern democratic constitutions.","cat":"philosophy", let rH=`<h3>Query Results</h3><div class="txt" style="font-style:italic">"${q.desc}"</div>`;
q.hits.forEach((h,i)=>{const nd=idData[h.id];const nc=COLORS[h.cat]||'#999';
rH+=`<div class="nb" onclick="window._sel('${h.id}')"><span style="color:${nc}">●</span> <b>${i+1}.</b> ${nd?nd.text.substring(0,60)+'…':h.id}<span class="dist">${(h.d*180/Math.PI).toFixed(1)}°</span></div>`;});
el.innerHTML=rH;el.classList.add('visible');
}));

ctrlEl.querySelectorAll('.pbtn').forEach(btn=>btn.addEventListener('click',()=>{
const pi=parseInt(btn.dataset.pi);const p=D.paths[pi];
document.querySelectorAll('.qbtn,.pbtn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
meshes.forEach(m=>m.scale.setScalar(1));clearLines();clearQueries();
drawPath(p.steps);
const el=document.getElementById('info');
let rH=`<h3>Concept Path</h3><div class="txt">${p.srcText.substring(0,60)}… → ${p.tgtText.substring(0,60)}…</div>
<div style="font-size:11px;color:#888;margin-bottom:8px">${p.steps.length-1} hops · ${p.dist.toFixed(4)} rad total</div>`;
p.steps.forEach((id,i)=>{const nd=idData[id];const nc=nd?COLORS[nd.cat]||'#999':'#999';
rH+=`<div class="nb" onclick="window._sel('${id}')"><span style="color:${nc}">●</span> <b>${i}.</b> ${nd?nd.text.substring(0,60)+'…':id}</div>`;});
el.innerHTML=rH;el.classList.add('visible');
}));

function updateHover(){
rc.setFromCamera(mouse,camera);
const h=rc.intersectObjects(meshes.filter(m=>m.visible));
const nw=h.length?h[0].object:null;
const hid=hovered?hovered.userData.id||null:null;
const nid=nw?nw.userData.id||null:null;
if(hovered&&hovered!==nw&&hid!==selectedId)hovered.scale.setScalar(1);
if(nw&&nid!==selectedId){nw.scale.setScalar(1.6);canvas.style.cursor='pointer';}
else canvas.style.cursor='grab';
hovered=nw;}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
(function animate(){requestAnimationFrame(animate);ctrl.update();updateHover();renderer.render(scene,camera);})();
</script>
</body>
</html>
