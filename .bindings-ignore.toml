# Bindings drift allowlist.
#
# Each entry says: this public item from `sphereql-embed` or
# `sphereql-layout` is known not to have a 1:1 binding in
# `sphereql-python` / `sphereql-wasm`. The `reason` field is a short
# human-readable explanation — reviewers read it when auditing drift.
#
# Add an entry when:
#   1. The item is surfaced indirectly (e.g. via a dict/config param,
#      or aggregated into a larger binding), OR
#   2. The item is genuinely internal / Rust-only, OR
#   3. The item doesn't map cleanly to Python/JS (generic traits, etc.).
#
# Remove an entry when the item gets a proper binding.
#
# Run the checker with:
#   cargo run -p check-drift

# ── Config structs (exposed via dict/JSON parameter, not as Python classes) ──

[[exempt]]
name = "PipelineConfig"
reason = "passed as dict/JSON to Pipeline(..., config=…) / Pipeline.newWithConfig"

[[exempt]]
name = "BridgeConfig"
reason = "sub-config inside PipelineConfig; reached via the outer dict"

