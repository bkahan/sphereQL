name: Python Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard against publishing a wheel with stale `.pyi` stubs. The
  # generator is deterministic — any diff against the checked-in file
  # means the binding author forgot to regenerate before tagging.
  verify-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate stubs
        working-directory: sphereql-python
        run: cargo run --bin gen-stubs
      - name: Fail if stubs are stale
        run: |
          if ! git diff --exit-code sphereql-python/python/sphereql/__init__.pyi; then
            echo "::error::python stubs are stale — run \`cargo run --bin gen-stubs\` from sphereql-python/ and commit before publishing"
            exit 1
          fi

  build:
    needs: verify-stubs
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Build wheels for every supported interpreter (3.10–3.13) via
      # maturin's abi3 path. Dropping 3.9 in line with pyo3 0.28 — the
      # crate's minimum supported interpreter.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 'python3.10 python3.11 python3.12 python3.13'
          manylinux: auto
          working-directory: sphereql-python
          before-all: |
            # Symlink manylinux container's Python into PATH so maturin
            # can find the oldest supported interpreter (3.10).
            if [ -d /opt/python/cp310-cp310/bin ]; then
              ln -sf /opt/python/cp310-cp310/bin/python3 /usr/local/bin/python3
            else
              echo "Python 3.10 not found at /opt/python/cp310-cp310/bin"
              ls /opt/python/ 2>/dev/null || echo "/opt/python does not exist"
              exit 1
            fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: sphereql-python/dist

  sdist:
    needs: verify-stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: sphereql-python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: sphereql-python/dist

  publish:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
