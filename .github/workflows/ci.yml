name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # sphereql-python is excluded: --all-features enables pyo3's
      # extension-module, which tells the linker "Python provides these
      # symbols at load time". That's correct for maturin's cdylib, but
      # it breaks `cargo test` link. Python-side tests run in the
      # `python` job below via maturin + pytest.
      - name: Run tests
        run: cargo test --workspace --all-features --exclude sphereql-python
      - name: Run doc-tests
        run: cargo test --doc --workspace --exclude sphereql-python

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  feature-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["core", "index", "layout", "embed", "graphql", "vectordb", "full", ""]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check feature ${{ matrix.features || 'no-default-features' }}
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo check -p sphereql --no-default-features
          else
            cargo check -p sphereql --features ${{ matrix.features }}
          fi

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install tools
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest numpy
      - name: Build and install sphereql
        working-directory: sphereql-python
        run: |
          source ../.venv/bin/activate
          maturin develop
      - name: Run Python tests
        working-directory: sphereql-python
        run: |
          source ../.venv/bin/activate
          pytest -v

  python-stubs:
    # Verifies the checked-in `__init__.pyi` matches what
    # `pyo3-stub-gen` would regenerate from the current bindings.
    # Keeps stubs from drifting when someone forgets to re-run the
    # generator after touching `#[pyclass]` / `#[pyfunction]` annotations.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate stubs
        working-directory: sphereql-python
        run: cargo run --bin gen-stubs
      - name: Fail if stubs are stale
        run: |
          if ! git diff --exit-code sphereql-python/python/sphereql/__init__.pyi; then
            echo "::error::python stubs are out of date — run \`cargo run --bin gen-stubs\` from sphereql-python/ and commit the diff"
            exit 1
          fi

  wasm:
    # Verifies the WASM bindings still build to `wasm32-unknown-unknown`
    # (the default cargo test target on this host is native Linux; a
    # break would only surface here otherwise).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM crate to wasm32
        run: cargo build -p sphereql-wasm --target wasm32-unknown-unknown

  bindings-drift:
    # Mirror of the separate bindings-drift workflow, but run on every
    # PR (not just those touching embed/layout/bindings) so the
    # allowlist can't silently rot.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run bindings drift check
        run: cargo run -p check-drift
