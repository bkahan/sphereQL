name: Crates.io Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  # Catch packaging errors before touching the registry.
  #
  # `cargo publish --dry-run` resolves every `path`-dep's version
  # against crates.io to validate the future-published tarball. That
  # means downstream crates can't be dry-run until their upstream is
  # actually on the registry — a chicken-and-egg for any workspace-wide
  # version bump. We scope this gate to `sphereql-core` (the leaf),
  # which has no intra-workspace deps and catches the common manifest
  # breaks: missing readme / description / license fields, bad
  # `include` patterns, version typos.
  #
  # Downstream crates are implicitly validated by the real publish
  # step below — if sphereql-core publishes cleanly, the 60-second
  # registry-wait in the publish job lets each subsequent
  # `cargo publish` resolve its deps against the freshly-landed
  # upstream.
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run sphereql-core (leaf crate)
        run: cargo publish -p sphereql-core --dry-run --allow-dirty

  publish:
    needs: dry-run
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order. Each crate waits for the registry
      # to index the previous publish before moving on — 60s is the
      # conservative floor; crates.io's CDN is usually faster but
      # occasionally lags behind a publish by ~30s.
      #
      # Order mirrors the workspace dependency graph:
      #   core → index → layout → embed → graphql → vectordb → sphereql
      # `sphereql-graphql` depends on `sphereql-embed` (added in
      # v0.2.0-alpha for the category resolvers), so it has to come
      # after embed.

      - name: Publish sphereql-core
        run: cargo publish -p sphereql-core
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql-index
        run: cargo publish -p sphereql-index
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql-layout
        run: cargo publish -p sphereql-layout
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql-embed
        run: cargo publish -p sphereql-embed
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql-graphql
        run: cargo publish -p sphereql-graphql
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql-vectordb
        run: cargo publish -p sphereql-vectordb
      - name: Wait for registry
        run: sleep 60

      - name: Publish sphereql (umbrella)
        run: cargo publish -p sphereql
